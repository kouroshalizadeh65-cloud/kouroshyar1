name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create Android platform
        run: flutter create . --platforms=android

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Get packages
        run: flutter pub get

      - name: Patch Android build settings
        run: |
          cat > android/key.properties <<'EOF'
          storePassword=kouroshyar123
          keyPassword=kouroshyar123
          keyAlias=kouroshyar
          storeFile=../../keystore/kouroshyar_upload.jks
          EOF
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          files = []
          files.extend(Path("android").glob("**/build.gradle"))
          files.extend(Path("android").glob("**/build.gradle.kts"))

          pub_cache = Path(os.environ.get("PUB_CACHE", ""))
          if pub_cache.exists():
              files.extend(pub_cache.glob("**/file_picker*/android/build.gradle"))
              files.extend(pub_cache.glob("**/file_picker*/android/build.gradle.kts"))
              files.extend(pub_cache.glob("**/flutter_plugin_android_lifecycle*/android/build.gradle"))
              files.extend(pub_cache.glob("**/flutter_plugin_android_lifecycle*/android/build.gradle.kts"))

          seen = set()
          patched = 0

          for p in files:
              p = p.resolve()
              if p in seen or not p.exists():
                  continue
              seen.add(p)
              text = p.read_text()
              new = text

              new = new.replace("compileSdk = flutter.compileSdkVersion", "compileSdk = 36")
              new = new.replace("targetSdk = flutter.targetSdkVersion", "targetSdk = 36")
              new = new.replace("compileSdkVersion flutter.compileSdkVersion", "compileSdkVersion 36")
              new = new.replace("targetSdkVersion flutter.targetSdkVersion", "targetSdkVersion 36")
              new = re.sub(r"compileSdk\s*=\s*\d+", "compileSdk = 36", new)
              new = re.sub(r"targetSdk\s*=\s*\d+", "targetSdk = 36", new)
              new = re.sub(r"compileSdk\s+\d+", "compileSdk 36", new)
              new = re.sub(r"targetSdk\s+\d+", "targetSdk 36", new)
              new = re.sub(r"compileSdkVersion\s*=\s*\d+", "compileSdkVersion = 36", new)
              new = re.sub(r"targetSdkVersion\s*=\s*\d+", "targetSdkVersion = 36", new)
              new = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 36", new)
              new = re.sub(r"targetSdkVersion\s+\d+", "targetSdkVersion 36", new)

              if p.name == "build.gradle.kts" and str(p).endswith("android/app/build.gradle.kts"):
                  if "java.util.Properties" not in new:
                      new = 'import java.util.Properties\nimport java.io.FileInputStream\n\n' + new
                  if "val keystoreProperties" not in new:
                      marker = "plugins {"
                      idx = new.find(marker)
                      if idx >= 0:
                          end = new.find("}\n", idx)
                          if end >= 0:
                              insert = '''\nval keystoreProperties = Properties()\nval keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n}\n'''
                              new = new[:end+2] + insert + new[end+2:]
                  if "create(\"release\")" not in new and "signingConfigs {" not in new:
                      new = new.replace("    defaultConfig {", '''    signingConfigs {\n        create("release") {\n            keyAlias = keystoreProperties["keyAlias"] as String\n            keyPassword = keystoreProperties["keyPassword"] as String\n            storeFile = file(keystoreProperties["storeFile"] as String)\n            storePassword = keystoreProperties["storePassword"] as String\n        }\n    }\n\n    defaultConfig {''')
                  new = re.sub(r"signingConfig\s*=\s*signingConfigs\.getByName\(\"debug\"\)", "signingConfig = signingConfigs.getByName(\"release\")", new)

              if new != text:
                  p.write_text(new)
                  print(f"Patched {p}")
                  patched += 1

          print(f"Total patched Gradle files: {patched}")
          PY


      - name: Patch Android manifest permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          permission = '<uses-permission android:name="android.permission.RECORD_AUDIO" />'
          if permission not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
              manifest.write_text(text)
              print("Added RECORD_AUDIO permission")
          else:
              print("RECORD_AUDIO permission already exists")
          PY

      - name: Configure biometric activity
        run: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for p in Path("android/app/src/main/kotlin").glob("**/MainActivity.kt"):
              text = p.read_text()
              new = text.replace(
                  "import io.flutter.embedding.android.FlutterActivity",
                  "import io.flutter.embedding.android.FlutterFragmentActivity",
              ).replace(
                  "FlutterActivity()",
                  "FlutterFragmentActivity()",
              )
              if new != text:
                  p.write_text(new)
                  print(f"Patched {p}")
                  patched += 1
          print(f"Total MainActivity patches: {patched}")
          PY

      - name: Analyze source
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/kouroshyar_v3_5_0_core_home_redesign_1405_04_12.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kouroshyar-v3-5-0-core-home-redesign-1405-04-12-apk
          path: build/app/outputs/flutter-apk/kouroshyar_v3_5_0_core_home_redesign_1405_04_12.apk
